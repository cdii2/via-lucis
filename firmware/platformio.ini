; Via Lucis firmware — two environments:
;   esp32dev — the real target (Arduino framework)
;   native   — desktop build of lib/core for fast logic tests (no hardware)

[platformio]
default_envs = esp32dev

[env]
; ArduinoJson is portable C++ (no Arduino headers) — used by lib/core settings
; and tested under native.
lib_deps = bblanchon/ArduinoJson@^7.2

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -std=gnu++17
    -DVIALUCIS_TARGET_ESP32
build_unflags = -std=gnu++11

[env:native]
platform = native
; PlatformIO-managed MinGW so Windows machines need no system compiler
platform_packages = platformio/toolchain-gccmingw32
build_flags =
    -std=gnu++17
    -DVIALUCIS_TARGET_NATIVE
test_framework = unity
