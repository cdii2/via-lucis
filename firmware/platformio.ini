; Via Lucis firmware — two environments:
;   esp32dev — the real target (Arduino framework)
;   native   — desktop build of lib/core for fast logic tests (no hardware)

[platformio]
default_envs = esp32dev

[env]
; ArduinoJson is portable C++ (no Arduino headers) — used by lib/core settings
; and tested under native.
lib_deps = bblanchon/ArduinoJson@^7.2

[env:esp32dev]
; Pinned exact (A1): a caret range on the platform once crossed an
; ESPAsyncWebServer matcher-semantics change; the route-shadowing fix below
; depends on AsyncURIMatcher::exact() behaving exactly as in 3.11.2 (resolved
; from espressif32 7.0.1). Bump deliberately, re-verify the §5 REST checklist.
platform = espressif32@7.0.1
board = esp32dev
framework = arduino
monitor_speed = 115200
; BLE + WiFi + web server exceed the default 1.3MB app slot. Custom table (T3,
; DESIGN-library.md A1): 2MB app + ~1.9MB LittleFS for songs/settings; no OTA
; (we flash over USB). See firmware/partitions.csv for the math and
; BUILD-GUIDE.md "Custom partition table" for the migration/flashing note.
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
build_flags =
    -std=gnu++17
    -DVIALUCIS_TARGET_ESP32
    -DASYNCWEBSERVER_REGEX
build_unflags = -std=gnu++11
lib_deps =
    ${env.lib_deps}
    fastled/FastLED@^3.7.0
    h2zero/NimBLE-Arduino@^1.4.3
    lathoub/BLE-MIDI@^2.2
    fortyseveneffects/MIDI Library@^5.0.2
    ESP32Async/ESPAsyncWebServer@3.11.2
    ESP32Async/AsyncTCP@^3.3.2

[env:native]
platform = native
; PlatformIO-managed MinGW so Windows machines need no system compiler
platform_packages = platformio/toolchain-gccmingw32
build_flags =
    -std=gnu++17
    -DVIALUCIS_TARGET_NATIVE
test_framework = unity
